openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ShopAll single-vendor e-commerce API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: cart
    description: Shopping cart operations
  - name: orders
    description: Order management
  - name: checkout
    description: Stripe checkout operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all active products with prices
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                required:
                  - data

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product with its prices
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List unique product categories from metadata
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string
                required:
                  - data

  /checkout/session:
    post:
      operationId: createCheckoutSession
      tags: [checkout]
      summary: Create a Stripe checkout session for one or more items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List recent successful orders (from Stripe payment intents)
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
                required:
                  - data

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Price:
      type: object
      properties:
        id:
          type: string
        unit_amount:
          type: integer
          nullable: true
        currency:
          type: string
        active:
          type: boolean
      required:
        - id
        - currency
        - active

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean
        images:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        prices:
          type: array
          items:
            $ref: "#/components/schemas/Price"
      required:
        - id
        - name
        - active
        - images
        - metadata
        - prices

    CheckoutLineItem:
      type: object
      properties:
        priceId:
          type: string
        quantity:
          type: integer
          default: 1
      required:
        - priceId

    CheckoutRequest:
      type: object
      properties:
        lineItems:
          type: array
          items:
            $ref: "#/components/schemas/CheckoutLineItem"
        successUrl:
          type: string
        cancelUrl:
          type: string
      required:
        - lineItems

    CheckoutResponse:
      type: object
      properties:
        url:
          type: string
        sessionId:
          type: string
      required:
        - url
        - sessionId

    Order:
      type: object
      properties:
        id:
          type: string
        amount:
          type: integer
        currency:
          type: string
        status:
          type: string
        created:
          type: integer
        customerEmail:
          type: string
          nullable: true
      required:
        - id
        - amount
        - currency
        - status
        - created

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
